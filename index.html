<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Registration</title>
    <link rel="stylesheet" href="sales.css" />
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: aliceblue;
    }
    .container {
      /* background-color: aqua; */
      height: 650px;
      display: flex;
      width: 100%;
      column-gap: 10px;
      padding-bottom: 10px;
    }
    .sidebar {
      flex: 1;
      /* height: 50vh; */
      /* border-right-width: 1px;
      border-right-color: black;
      border-right-style: solid; */
      border: 1px solid black;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
      padding: 10px;
    }
    .sidebar a {
      display: block;
      padding: 12px 15px;
      text-decoration: none;
      color: black;
      text-align: center;
      border-radius: 5px;
      border: 1px black solid;
      font-weight: bold;
    }
    .content {
      flex: 3;
      border: 1px black solid;
      padding: 20px;
    }
    .input-container {
      display: flex;
      /* border:1px black solid; */
    }
    .input-section {
      display: flex;
      flex-direction: column;     
      flex: 1;
      padding: 5px;
    }
    .input-main {
      display: flex;
      margin-bottom: 15px;
      gap: 20px;
    }
    .input-branch {
      display: flex;
      flex: 1;
      flex-direction: column;
    }
    input,
    select {
      height: 40px;
      box-sizing: border-box;
      background-color: lightgray;
    }
    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      /* margin-top: 15px; */
    }
    .buttons button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .cancel-button {
      background-color: lightpink;
    }
    .submit-button {
      background-color: lightpink;
    }
    h1,
    h2 {
      text-align: center;
    }
    .profile {
      display: flex;
      padding-bottom: 20px;
      flex-direction: column;
    }
    .profile-picture {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px black solid;
      object-fit: cover;
      background-color: lightgrey;
      margin-right: 30px;
      margin-left: 70px;
    }
    .form{
      padding:10px;
      text-align: center;
    }
  </style>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="profile">
          <div class="profile-picture">
            <img src="" />
          </div>
          <form>
            <div class="form">
            <label for="yourname">Your name</label>
            <input type="text" placeholder="full name" required>
            </div>
            <div class="form">
            <label for="position">Job Title</label>
            <input type="text" placeholder="Job Title">
            </div>
          </form>
        </div>
        <div>
          <a href="./dashboard.html">dashboard</a>
        </div>
        <div>
          <a href="./supplierregistration.html">supplier management</a>
        </div>
        <div>
          <a href="./stock.html">Stock management</a>
        </div>
        <div>
          <a href="./transport.html">Transport management</a>
        </div>
      </div>
      <div class="content">
        <form action="">
          <!-- section 1 -->
          <section>
            <h1>Sales Registration</h1>
            <div class="input-container">
              <div class="input-section">
                <label for="SalesDate">Sales Date</label>
                <input type="date" />
              </div>

              <div class="input-section">
                <label for="salesperson">Sales person</label>
                <select name="" id="">
                  <option value="" disabled selected>
                    Select a representative
                  </option>
                  <option value="">Priscilla Akwee</option>
                  <option value="">Joan Atimango</option>
                  <option value="">Violah Kiconco</option>
                  <option value="">Brendalyn Musoki</option>
                  <option value="">Phiona Najjuma</option>
                </select>
              </div>
            </div>
          </section>
          <!-- section 2 -->
          <section>
            <h2>Customer Details</h2>
            <!-- Row 1 -->
            <div class="input-main">
              <div class="input-branch">
                <label for="name">Name</label>
                <input type="text" placeholder="Enter full name" required />
              </div>
              <div class="input-branch">
                <label for="phonenumber">Phone Number</label>
                <input type="number" placeholder="Enter Phone Number" />
              </div>
            </div>
            <!-- Row 2 -->
            <div class="input-main">
              <div class="input-branch">
                <label for="email">Email</label>
                <input type="alphanumeric" placeholder="Enter Email" />
              </div>
              <div class="input-branch">
                <label for="customertype">Customer Type</label>
                <select name="" id="">
                  <option value="" disabled selected>
                    Select Customer Type
                  </option>
                  <option value="">Cash</option>
                  <option value="">Credit</option>
                  <option value="">Contractor</option>
                  <option value="">Retail</option>
                </select>
              </div>
            </div>
          </section>
          <!-- section 3 -->
          <section>
            <h2>Items</h2>
            <!-- Row 3 -->
            <div class="input-main">
              <div class="input-branch">
                <label for="pdtId">Pdt Id</label>
                <input type="alphanumeric" required />
              </div>
              <div class="input-branch">
                <label for="quantity">Quantity</label>
                <input type="alphanumeric" required />
              </div>
              <div class="input-branch">
                <label for="unitprice">Unit Price</label>
                <input type="alphanumeric" />
              </div>
            </div>
            <!-- Row 4 -->
            <div class="input-main">
              <div class="input-branch">
                <label for="pdtId">Pdt Id</label>
                <input type="alphanumeric" required />
              </div>
              <div class="input-branch">
                <label for="quantity">Quantity</label>
                <input type="alphanumeric" required />
              </div>
              <div class="input-branch">
                <label for="unitprice">Unit Price</label>
                <input type="alphanumeric" />
              </div>
            </div>
          </section>
          <!-- Buttons -->
          <div class="buttons">
            <button type="reset" class="cancel-button">Cancel</button>
            <button type="submit" class="submit-button">Submit</button>
          </div>
        </form>
      </div>
      <div class="column"></div>
    </div>
  </body>
</html>
